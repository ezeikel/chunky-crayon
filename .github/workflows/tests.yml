name: Tests

# Unit tests run on every push to main and on PRs — fast, no infra.
# Playwright e2e runs in a separate, gated, non-blocking job (it needs a
# built app + seeded DB + browsers, so it's inherently slower).
#
# Posture (2026-05): the repo pushes straight to main with no branch
# protection, so neither job *blocks* a merge today. They exist to make a
# red test loud and to be ready the day PRs/branch protection are turned
# on. When that happens, mark the `unit` job required in branch settings.
#
# Every job has an explicit timeout — a hung step must die fast, not run
# until GitHub's 6h default (that's what forced a manual cancel the first
# time this shipped).

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: '20'

# Cancel superseded runs ONLY for PRs (a new push to a PR makes the old
# run moot). For pushes to main, every commit gets its own run that is
# allowed to finish — otherwise rapid back-to-back pushes (common here
# with parallel work sessions) cancel each other and main is NEVER
# actually verified. The group is per-SHA on push, per-ref on PR.
concurrency:
  group: >-
    tests-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: pnpm install --frozen-lockfile

      # turbo's `test` task depends on `db:generate`; prisma generate needs
      # only the schema (the datasource has no url=env(...)), so no DB
      # secret is required here. Vitest imports package src/ directly, so
      # the workspace packages do NOT need to be tsc-built for unit tests.
      - name: Run unit tests
        run: pnpm test

  # Gate e2e on the seed DB secret existing. Without it the job is skipped
  # (the run stays green) rather than a confusing red — until a
  # PLAYWRIGHT_DATABASE_URL secret exists, e2e simply doesn't run.
  #
  # PLAYWRIGHT_DATABASE_URL points at a PERSISTENT, CI-owned Neon branch
  # (`ci-e2e`), NOT a throwaway. It is forked from dev ONCE at creation, then
  # lives forever: the "Apply migrations to the Playwright DB" step in the e2e
  # job below runs `prisma migrate deploy` every run, so its SCHEMA auto-tracks
  # main's committed migration history (same history dev + prod follow). Its
  # CONTENT is only the e2e test seed (seed-test-user.ts is idempotent —
  # upserts — so it's safe to re-run). Do NOT re-fork it per run (that would
  # drag in dev's real data and cost a branch-create each run); do NOT point it
  # at dev or prod.
  e2e-precheck:
    name: e2e precheck
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has_db: ${{ steps.check.outputs.has_db }}
    steps:
      - id: check
        env:
          PLAYWRIGHT_DATABASE_URL: ${{ secrets.PLAYWRIGHT_DATABASE_URL }}
        run: |
          if [ -n "$PLAYWRIGHT_DATABASE_URL" ]; then
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_db=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PLAYWRIGHT_DATABASE_URL secret not set — e2e job will be skipped. Add it (a throwaway Neon branch) to enable Playwright in CI."
          fi

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: e2e-precheck
    if: ${{ needs.e2e-precheck.outputs.has_db == 'true' }}
    # Non-blocking: surface failures without making the whole run red.
    continue-on-error: true
    # Hard ceiling — install + Playwright download + dev-server compile +
    # the specs. If exceeded something is wedged; kill it rather than let
    # it run for hours.
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.PLAYWRIGHT_DATABASE_URL }}
      # `/en`'s render tree imports modules that construct SDK clients at
      # MODULE LOAD with the key required — flags.ts (`new PostHog(
      # NEXT_PUBLIC_POSTHOG_KEY!)`), lib/stripe.ts (`new Stripe(STRIPE_SECRET!)`),
      # and app/actions/email.ts (`new Resend(RESEND_API_KEY)`). With the key
      # undefined the constructor throws at evaluation, so `next dev` serves /en
      # as a 500 and no spec can run. The specs don't exercise real
      # Stripe/PostHog/Resend, so non-empty PLACEHOLDER values get past the
      # constructors. These are the only module-load SDK constructors on the /en
      # path (verified by grep; OpenAI/moderation are lazy + not imported by /en).
      # If real CI secrets are ever added, prefer `${{ secrets.* }}`.
      STRIPE_SECRET: 'sk_test_ci_placeholder'
      NEXT_PUBLIC_POSTHOG_KEY: 'phc_ci_placeholder'
      NEXT_PUBLIC_POSTHOG_HOST: 'https://eu.i.posthog.com'
      RESEND_API_KEY: 're_ci_placeholder'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: pnpm install --frozen-lockfile

      # Cache the Playwright browser download (~290 MB of chromium +
      # headless shell + ffmpeg) keyed on the playwright version in the
      # lockfile. First run is slow; every run after is a cache hit.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: ./apps/chunky-crayon-web
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: ./apps/chunky-crayon-web
        run: pnpm exec playwright install-deps chromium

      # We run the specs against `next dev`, NOT a production build.
      # Rationale: a full `next build` of this 3437-page app does
      # page-data collection that imports modules constructing API
      # clients (Stripe, Resend, PostHog, …) at top level — each throws
      # on a missing key, so a CI build needs ~most of the 60-var prod
      # env. `next dev` compiles routes on demand and tolerates missing
      # env, which is exactly how these specs are verified locally. For a
      # non-blocking smoke job this is the right trade.
      #
      # Both `next dev` AND the seed script need the workspace packages
      # built — they export from dist/ (tsc output), and `pnpm install`
      # only runs `prisma generate`, not the package tsc builds. Build
      # exactly the 7 packages the web app depends on, NOT the Next app
      # itself (`^...` = dependencies-of, excluding the package). This is
      # ~30s of tsc, vs the ~2min full prod build we're avoiding.
      - name: Build workspace packages (deps of the web app)
        run: pnpm exec turbo run build --filter=@one-colored-pixel/chunky-crayon-web^...

      # Bring the ci-e2e Neon branch up to the current schema BEFORE seeding.
      # The branch is forked from dev once and persists; this step applies the
      # committed migration history every run so its schema tracks main and the
      # seed never hits a missing column (Prisma P2022). `migrate deploy` is
      # idempotent. Uses the job-level DATABASE_URL (= PLAYWRIGHT_DATABASE_URL).
      #
      # Retry migrate deploy: the ci-e2e Neon compute auto-suspends after 300s
      # idle, so the first connection of a run can race its cold-start wake
      # (Prisma errors P1001 "can't reach database" and does NOT retry the
      # initial connect). A few attempts with backoff cover the ~5-10s wake and
      # any brief Neon blip. `migrate deploy` is idempotent — re-running after a
      # partial/failed connect is safe.
      - name: Apply migrations to the Playwright DB
        env:
          DATABASE_URL: ${{ secrets.PLAYWRIGHT_DATABASE_URL }}
        working-directory: ./packages/db
        run: |
          for attempt in 1 2 3 4 5; do
            echo "migrate deploy attempt $attempt…"
            if pnpm exec prisma migrate deploy; then
              echo "migrate deploy succeeded"; exit 0
            fi
            echo "attempt $attempt failed (likely cold Neon compute); waiting before retry…"
            sleep 10
          done
          echo "::error::prisma migrate deploy failed after 5 attempts"
          exit 1

      - name: Seed Playwright test user
        working-directory: ./apps/chunky-crayon-web
        run: pnpm tsx scripts/seed-test-user.ts

      - name: Run Playwright tests (against next dev)
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'
        working-directory: ./apps/chunky-crayon-web
        # `next dev` on this large app is slow to first-serve on CI runners
        # (Turbopack cold compile of the full i18n homepage, which also does DB
        # reads). The "Ready" log line means the process is UP, but the first
        # request to /en still triggers a multi-minute on-demand compile. The
        # old flow warmed with a `curl ... || true` (failure swallowed) then
        # gated on `wait-on --timeout 120000` — but /en's cold compile exceeds
        # 120s on the runner, so wait-on timed out before the route ever served.
        # Fix: make the warm request itself the readiness gate — poll /en until
        # it returns HTTP 200 with a generous overall budget (up to ~6.5 min),
        # failing loudly (dumping dev.log) if it never comes up. No separate
        # wait-on. The specs' gotoStable() helper absorbs per-route compiles
        # after the homepage is warm.
        run: |
          pnpm dev > /tmp/dev.log 2>&1 &
          DEV_PID=$!
          echo "Waiting for next dev to report Ready..."
          for i in $(seq 1 60); do
            if grep -qE "Ready in|started server|Local:.*3000" /tmp/dev.log; then
              echo "next dev is up"; break
            fi
            if ! kill -0 "$DEV_PID" 2>/dev/null; then
              echo "::error::next dev exited early"; cat /tmp/dev.log; exit 1
            fi
            sleep 3
          done
          echo "Warming /en until it serves 200 (forces first Turbopack compile)..."
          warm_ok=""
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 http://localhost:3000/en || echo "000")
            echo "  attempt $i: /en -> HTTP $code"
            if [ "$code" = "200" ]; then warm_ok="yes"; break; fi
            if ! kill -0 "$DEV_PID" 2>/dev/null; then
              echo "::error::next dev exited during warmup"; cat /tmp/dev.log; exit 1
            fi
            sleep 10
          done
          if [ -z "$warm_ok" ]; then
            echo "::error::/en never served 200 within the warmup budget"; tail -80 /tmp/dev.log; exit 1
          fi
          echo "/en is warm; running specs"
          pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/chunky-crayon-web/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
