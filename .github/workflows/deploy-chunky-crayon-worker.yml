name: Deploy Chunky Crayon Worker

on:
  push:
    branches:
      - main
    paths:
      - 'apps/chunky-crayon-worker/**'
      - '.github/workflows/deploy-chunky-crayon-worker.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        default: 'deploy-and-restart'
        type: choice
        options:
          - deploy-and-restart
          - deploy-only
          - restart-only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e

            ACTION="${{ inputs.action || 'deploy-and-restart' }}"
            cd /opt/chunky-crayon

            if [[ "$ACTION" == deploy* ]]; then
              echo "Pulling latest code..."
              git checkout -- . || true
              git clean -fd apps/chunky-crayon-worker/ || true
              git pull origin main
              echo "Code pulled"

              echo "Installing chunky-crayon-worker dependencies..."
              # Monorepo uses pnpm workspace:* refs for @one-colored-pixel/db
              # and @one-colored-pixel/storage — must install from repo root so
              # pnpm can resolve workspace deps. Filter to only the worker's
              # dep graph to avoid pulling in the full web + mobile trees.
              # FONTAWESOME_NPM_AUTH_TOKEN lives at /root/.npmrc-fontawesome so
              # pnpm can substitute ${FONTAWESOME_NPM_AUTH_TOKEN} in the repo's
              # .npmrc (web/mobile apps need Pro icons).
              set -a; source /root/.npmrc-fontawesome; set +a
              yes | /root/.local/share/pnpm/pnpm install \
                --filter "@one-colored-pixel/chunky-crayon-worker..."
              echo "Worker deps installed"

              echo "Syncing pdf-to-png script to isolated /opt/pdf-tools..."
              cp apps/chunky-crayon-worker/src/scripts/pdf-to-png.mjs /opt/pdf-tools/pdf-to-png.mjs

              echo "Building shared packages..."
              /root/.local/share/pnpm/pnpm --filter @one-colored-pixel/db build
              /root/.local/share/pnpm/pnpm --filter @one-colored-pixel/storage build
              /root/.local/share/pnpm/pnpm --filter @one-colored-pixel/canvas build
              /root/.local/share/pnpm/pnpm --filter @one-colored-pixel/coloring-core build
              echo "Shared packages built"
            fi

            if [[ "$ACTION" != deploy-only ]]; then
              echo "Restarting chunky-crayon-worker service..."
              systemctl restart chunky-crayon-worker
              echo "Service restarted"
            fi

            sleep 3
            echo ""
            echo "=== Service Status ==="
            systemctl status chunky-crayon-worker --no-pager -l || true
            echo ""
            echo "=== Recent Logs ==="
            journalctl -u chunky-crayon-worker --no-pager -n 30 || true
            echo ""
            echo "=== Health Check ==="
            curl -s http://localhost:3030/health || echo "Health check failed"
