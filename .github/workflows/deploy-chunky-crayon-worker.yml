name: Deploy Chunky Crayon Worker

on:
  push:
    branches:
      - main
    paths:
      - 'apps/chunky-crayon-worker/**'
      - '.github/workflows/deploy-chunky-crayon-worker.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        default: 'deploy-and-restart'
        type: choice
        options:
          - deploy-and-restart
          - deploy-only
          - restart-only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e

            ACTION="${{ inputs.action || 'deploy-and-restart' }}"
            cd /opt/chunky-crayon

            if [[ "$ACTION" == deploy* ]]; then
              echo "Pulling latest code..."
              git checkout -- . || true
              git clean -fd apps/chunky-crayon-worker/ || true
              git pull origin main
              echo "Code pulled"

              echo "Installing chunky-crayon-worker dependencies..."
              cd apps/chunky-crayon-worker
              rm -rf node_modules
              ~/.bun/bin/bun install
              echo "Dependencies installed"
              cd /opt/chunky-crayon
            fi

            if [[ "$ACTION" != deploy-only ]]; then
              echo "Restarting chunky-crayon-worker service..."
              systemctl restart chunky-crayon-worker
              echo "Service restarted"
            fi

            sleep 3
            echo ""
            echo "=== Service Status ==="
            systemctl status chunky-crayon-worker --no-pager -l || true
            echo ""
            echo "=== Recent Logs ==="
            journalctl -u chunky-crayon-worker --no-pager -n 30 || true
            echo ""
            echo "=== Health Check ==="
            curl -s http://localhost:3030/health || echo "Health check failed"
